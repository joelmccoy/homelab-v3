name: argocd-diff

on:
  pull_request:
    branches: [main]
    paths:
      - "k8s/apps/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  diff:
    name: ArgoCD manifest diff preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: target-branch
          fetch-depth: 0

      - name: Checkout base branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: main
          path: base-branch
          fetch-depth: 0

      - name: Render ArgoCD diff
        run: |
          mkdir -p output
          docker run \
            --network=host \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}/base-branch:/base-branch" \
            -v "${{ github.workspace }}/target-branch:/target-branch" \
            -v "${{ github.workspace }}/output:/output" \
            -e TARGET_BRANCH="${{ github.head_ref }}" \
            -e REPO="${{ github.repository }}" \
            dagandersen/argocd-diff-preview:v0.1.17@sha256:54407a065415b49b13c32739bbb7227b3704d1d5fa3ced7fdbfb963462e898f6

      - name: Post diff as PR comment
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file output/diff.md \
            --edit-last || \
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file output/diff.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
