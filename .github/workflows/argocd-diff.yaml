name: argocd-diff

on:
  pull_request:
    branches: [main]
    paths:
      - "k8s/apps/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  diff:
    name: ArgoCD manifest diff preview
    # This job renders pull-request manifests through a container with Docker socket
    # access. Only run that heavier preview for branches in this repository, not
    # arbitrary fork code.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: target-branch
          fetch-depth: 0

      - name: Checkout base branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          path: base-branch
          fetch-depth: 0

      - name: Render ArgoCD diff
        run: |
          mkdir -p output
          docker run \
            --network=host \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}/base-branch:/base-branch" \
            -v "${{ github.workspace }}/target-branch:/target-branch" \
            -v "${{ github.workspace }}/output:/output" \
            -e TARGET_BRANCH="${{ github.head_ref }}" \
            -e REPO="${{ github.repository }}" \
            dagandersen/argocd-diff-preview:v0.2.7@sha256:be51cde7afa24d8463b370169ca740179f6ade697ac18406dc5b45b048d1e48c

      - name: Post diff as PR comment
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file output/diff.md \
            --edit-last || \
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file output/diff.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
