name: argocd-diff

on:
  pull_request:
    branches: [main]
    paths:
      - "k8s/apps/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  diff:
    name: ArgoCD manifest diff preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: target-branch
          fetch-depth: 0

      - name: Checkout base branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          path: base-branch
          fetch-depth: 0

      - name: Render ArgoCD diff
        run: |
          mkdir -p output
          docker run \
            --network=host \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}/base-branch:/base-branch" \
            -v "${{ github.workspace }}/target-branch:/target-branch" \
            -v "${{ github.workspace }}/output:/output" \
            -e TARGET_BRANCH="${{ github.head_ref }}" \
            -e REPO="${{ github.repository }}" \
            dagandersen/argocd-diff-preview:v0.2.4@sha256:1495befe6099ed8a1c8af7e0d6e9e941a8ae01a752eb497a9e1c4eb503455a45

      - name: Post diff as PR comment
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file output/diff.md \
            --edit-last || \
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file output/diff.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
