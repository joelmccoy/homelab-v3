title = "homelab-v3 gitleaks config"

[extend]
useDefault = true

# SealedSecret ciphertext is safe to commit, but do not allowlist entire
# SealedSecret files: that would also hide an accidental plaintext token in the
# same file. Only ignore kubeseal ciphertext value lines.
[[allowlists]]
description = "Allow kubeseal ciphertext lines in SealedSecret manifests"
condition = "AND"
regexTarget = "line"
paths = [
  '''.*-sealed-secret\.yaml$''',
]
regexes = [
  '''^\s+[A-Za-z0-9_.-]+:\s+Ag[A-Za-z0-9+/=]+$''',
]
