# ArgoCD only resolves $secret-name:key in argocd-cm if the Secret carries
# `app.kubernetes.io/part-of: argocd`. Crossplane's writeConnectionSecretToRef
# doesn't expose label customization, so this Job stamps the label after the
# Client CR's connection Secret appears. Idempotent (--overwrite + sync hook).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: keycloak-client-secret-labeler
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "25"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: keycloak-client-secret-labeler
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "25"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["argocd-keycloak-client"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: keycloak-client-secret-labeler
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "25"
subjects:
  - kind: ServiceAccount
    name: keycloak-client-secret-labeler
    namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: keycloak-client-secret-labeler
---
apiVersion: batch/v1
kind: Job
metadata:
  name: label-keycloak-client-secret
  namespace: argocd
  annotations:
    # PostSync runs after Client CR + connection Secret are ready.
    # HookFailed in delete-policy means a stuck Job (bad image, RBAC drift, etc)
    # auto-cleans up rather than blocking future syncs forever.
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded,HookFailed
spec:
  # Hard deadline + tight backoff: if the Job can't label the Secret in 5min,
  # something's wrong — fail fast so the next sync can retry with fresh spec.
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: keycloak-client-secret-labeler
      # argocd ns enforces PSS restricted; container needs the standard hardening.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kubectl
          # alpine/k8s = alpine base + kubectl — needed because the script uses `sh`.
          # rancher/kubectl is distroless and has no shell.
          image: alpine/k8s:1.36.0
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          command:
            - sh
            - -c
            - |
              set -e
              for i in $(seq 1 60); do
                if kubectl get secret argocd-keycloak-client -n argocd >/dev/null 2>&1; then
                  kubectl label secret argocd-keycloak-client -n argocd \
                    app.kubernetes.io/part-of=argocd --overwrite
                  echo "labeled."
                  exit 0
                fi
                echo "waiting for argocd-keycloak-client secret ($i/60)..."
                sleep 5
              done
              echo "timed out waiting for secret"
              exit 1
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
