# ArgoCD helm values.
# Single source: consumed by docs/bootstrap.md and k8s/apps/argo-cd/application.yaml.

global:
  domain: argo.joelmccoy.dev

configs:
  params:
    server.insecure: "true"   # TLS terminates at Istio Gateway later
  cm:
    application.resourceTrackingMethod: annotation
    timeout.reconciliation: 60s
  secret:
    # We provide argocd-secret entirely via SealedSecret in manifests/.
    createSecret: false

server:
  extraArgs:
    - --insecure
  service:
    type: ClusterIP

applicationSet:
  enabled: true

dex:
  enabled: false

notifications:
  enabled: true
  argocdUrl: https://argo.joelmccoy.dev

  # Secret is provided as a SealedSecret in manifests/notifications-sealed-secret.yaml.
  secret:
    create: false

  notifiers:
    service.github: |
      appID: 3583267
      installationID: 129064009
      privateKey: $github-privateKey

  templates:
    template.app-deployed: |
      message: |
        Application {{.app.metadata.name}} is synced and healthy.
        Revision: {{.app.status.operationState.syncResult.revision}}
      github:
        # Multi-source apps: sources[1] is the ref:values git source pointing at our repo.
        repoURLPath: "{{(index .app.spec.sources 1).repoURL}}"
        revisionPath: "{{(index .app.status.operationState.syncResult.revisions 1)}}"
        status:
          state: success
          label: "argocd/{{.app.metadata.name}}"
          targetURL: "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}"
    template.app-sync-failed: |
      message: |
        Sync failed for {{.app.metadata.name}}: {{.app.status.operationState.message}}
      github:
        # Multi-source apps: sources[1] is the ref:values git source pointing at our repo.
        repoURLPath: "{{(index .app.spec.sources 1).repoURL}}"
        revisionPath: "{{(index .app.status.operationState.syncResult.revisions 1)}}"
        status:
          state: failure
          label: "argocd/{{.app.metadata.name}}"
          targetURL: "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}"
    template.app-sync-running: |
      message: |
        Syncing {{.app.metadata.name}}.
      github:
        # Multi-source apps: sources[1] is the ref:values git source pointing at our repo.
        repoURLPath: "{{(index .app.spec.sources 1).repoURL}}"
        revisionPath: "{{(index .app.status.operationState.syncResult.revisions 1)}}"
        status:
          state: pending
          label: "argocd/{{.app.metadata.name}}"
          targetURL: "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}"

  triggers:
    trigger.on-deployed: |
      - description: Application is synced and healthy
        oncePer: app.status.operationState.syncResult.revision
        when: app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
        send: [app-deployed]
    trigger.on-sync-failed: |
      - description: Application sync failed
        when: app.status.operationState.phase in ['Error', 'Failed']
        send: [app-sync-failed]
    trigger.on-sync-running: |
      - description: Application is syncing
        when: app.status.operationState.phase in ['Running']
        send: [app-sync-running]

  # Apply notifications to every Application by default.
  subscriptions:
    - recipients:
        - github
      triggers:
        - on-deployed
        - on-sync-failed
        - on-sync-running
