# ArgoCD helm values.
# Single source: consumed by docs/bootstrap.md and k8s/apps/argo-cd/application.yaml.

global:
  domain: argo.joelmccoy.dev
  image:
    repository: quay.io/argoproj/argocd
    tag: v3.3.9

redis:
  image:
    repository: ecr-public.aws.com/docker/library/redis
    tag: 8.2.3-alpine

configs:
  params:
    server.insecure: "true"   # TLS terminates at Istio Gateway later
  cm:
    application.resourceTrackingMethod: annotation
    timeout.reconciliation: 60s
    url: https://argo.joelmccoy.dev
    # Disable local admin — auth is OIDC-only via Keycloak. Break-glass remains
    # via in-cluster kubeconfig (`argocd login --core`).
    admin.enabled: "false"
    # OIDC via Keycloak homelab realm. clientSecret pulled from the Crossplane
    # connection Secret (a Job in manifests/ adds the part-of=argocd label so
    # ArgoCD will resolve `$secret-name:key`). logoutURL triggers RP-initiated
    # logout at KC so signing out of ArgoCD also kills the KC session.
    oidc.config: |
      name: Keycloak
      issuer: https://sso.joelmccoy.dev/realms/homelab
      clientID: argocd
      clientSecret: $argocd-keycloak-client:attribute.client_secret
      requestedScopes: ["openid", "profile", "email", "groups"]
      requestedIDTokenClaims:
        groups:
          essential: true
      logoutURL: https://sso.joelmccoy.dev/realms/homelab/protocol/openid-connect/logout?id_token_hint={{token}}&post_logout_redirect_uri={{logoutRedirectURL}}
  rbac:
    # Empty default → unmapped users get no role (login allowed but 403 on resources).
    policy.default: ""
    scopes: "[groups]"
    policy.csv: |
      g, admins, role:admin
  secret:
    # We provide argocd-secret entirely via SealedSecret in manifests/.
    createSecret: false

server:
  extraArgs:
    - --insecure
  service:
    type: ClusterIP

applicationSet:
  enabled: true

dex:
  enabled: false

notifications:
  enabled: true
  argocdUrl: https://argo.joelmccoy.dev

  # Secret is provided as a SealedSecret in manifests/notifications-sealed-secret.yaml.
  secret:
    create: false

  notifiers:
    service.github: |
      appID: 3583267
      installationID: 129064009
      privateKey: $github-privateKey

  templates:
    template.app-deployed: |
      message: |
        Application {{.app.metadata.name}} is synced and healthy.
        Revision: {{.app.status.operationState.syncResult.revision}}
      github:
        # Multi-source apps: sources[1] is the ref:values git source pointing at our repo.
        repoURLPath: "{{(index .app.spec.sources 1).repoURL}}"
        revisionPath: "{{(index .app.status.operationState.syncResult.revisions 1)}}"
        status:
          state: success
          label: "argocd/{{.app.metadata.name}}"
          targetURL: "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}"
    template.app-sync-failed: |
      message: |
        Sync failed for {{.app.metadata.name}}: {{.app.status.operationState.message}}
      github:
        # Multi-source apps: sources[1] is the ref:values git source pointing at our repo.
        repoURLPath: "{{(index .app.spec.sources 1).repoURL}}"
        revisionPath: "{{(index .app.status.operationState.syncResult.revisions 1)}}"
        status:
          state: failure
          label: "argocd/{{.app.metadata.name}}"
          targetURL: "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}"
    template.app-sync-running: |
      message: |
        Syncing {{.app.metadata.name}}.
      github:
        # Multi-source apps: sources[1] is the ref:values git source pointing at our repo.
        repoURLPath: "{{(index .app.spec.sources 1).repoURL}}"
        revisionPath: "{{(index .app.status.operationState.syncResult.revisions 1)}}"
        status:
          state: pending
          label: "argocd/{{.app.metadata.name}}"
          targetURL: "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}"

  triggers:
    trigger.on-deployed: |
      - description: Application is synced and healthy
        oncePer: app.status.operationState.syncResult.revision
        when: app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
        send: [app-deployed]
    trigger.on-sync-failed: |
      - description: Application sync failed
        when: app.status.operationState.phase in ['Error', 'Failed']
        send: [app-sync-failed]
    trigger.on-sync-running: |
      - description: Application is syncing
        when: app.status.operationState.phase in ['Running']
        send: [app-sync-running]

  # Apply notifications to every Application by default.
  subscriptions:
    - recipients:
        - github
      triggers:
        - on-deployed
        - on-sync-failed
        - on-sync-running
