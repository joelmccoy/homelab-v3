# cert-manager helm values.
# Single source: consumed by k8s/apps/cert-manager/application.yaml.

crds:
  enabled: true

prometheus:
  enabled: false

# DNS01 with public DNS-over-https (avoid recursion through cluster DNS).
extraArgs:
  - --dns01-recursive-nameservers-only
  - --dns01-recursive-nameservers=1.1.1.1:53,1.0.0.1:53
