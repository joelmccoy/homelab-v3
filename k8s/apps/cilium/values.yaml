# Cilium helm values for Talos.
# Single source: consumed by scripts/bootstrap.sh and by k8s/apps/cilium/application.yaml.

ipam:
  mode: kubernetes

kubeProxyReplacement: true

# Talos exposes the kube-apiserver on every node at localhost:7445 (apid forwards).
k8sServiceHost: localhost
k8sServicePort: 7445

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

# Istio Ambient compatibility (per ADR 0006).
socketLB:
  hostNamespaceOnly: true

hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true

operator:
  replicas: 1

hostFirewall:
  enabled: false
