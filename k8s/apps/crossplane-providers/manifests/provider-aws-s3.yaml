# Upjet-based AWS S3 provider — used to declaratively manage Bucket CRs
# against any S3-compatible endpoint (RustFS in our case). The smaller
# split provider keeps the CRD blast radius down vs the monolithic
# provider-aws.
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-aws-s3
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  package: xpkg.upbound.io/upbound/provider-aws-s3:v2.5.3
