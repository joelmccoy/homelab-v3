# ProviderConfig tells provider-keycloak how to authenticate to Keycloak admin API.
# Credentials Secret holds JSON with: client_id, username, password, realm, url.
apiVersion: keycloak.crossplane.io/v1beta1
kind: ProviderConfig
metadata:
  name: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    # CRD only exists after the Provider above has downloaded its pkg.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: keycloak-system
      name: keycloak-crossplane-credentials
      key: credentials
