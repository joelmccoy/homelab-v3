# ProviderConfig for provider-aws-s3 pointed at the in-cluster RustFS endpoint.
# RustFS speaks the S3 API (CreateBucket, etc) but is not real AWS, so we have
# to disable all AWS-specific validations (STS, IMDS, account-ID lookup) and
# force path-style addressing — RustFS doesn't do virtual-hosted-style.
apiVersion: aws.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: rustfs
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    # CRD doesn't exist until provider-aws-s3 finishes pulling its package.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: crossplane-system
      name: rustfs-aws-credentials
      key: credentials
  endpoint:
    url:
      type: Static
      static: http://rustfs-svc.rustfs.svc.cluster.local:9001
    services:
      - id: s3
  s3_use_path_style: true
  skip_credentials_validation: true
  skip_metadata_api_check: true
  skip_requesting_account_id: true
  skip_region_validation: true
