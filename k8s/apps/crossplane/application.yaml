apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: default
  sources:
    - repoURL: https://charts.crossplane.io/stable
      chart: crossplane
      targetRevision: 2.2.1
      helm:
        releaseName: crossplane
        valueFiles:
          - $values/k8s/apps/crossplane/values.yaml
    - repoURL: https://github.com/joelmccoy/homelab-v3.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/joelmccoy/homelab-v3.git
      targetRevision: main
      path: k8s/apps/crossplane/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
