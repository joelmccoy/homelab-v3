apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  sources:
    - repoURL: https://kubernetes-sigs.github.io/external-dns
      chart: external-dns
      targetRevision: 1.21.1
      helm:
        releaseName: external-dns
        valueFiles:
          - $values/k8s/apps/external-dns/values.yaml
    - repoURL: https://github.com/joelmccoy/homelab-v3.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/joelmccoy/homelab-v3.git
      targetRevision: main
      path: k8s/apps/external-dns/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
