# external-dns helm values.
# Watches Gateway/HTTPRoute resources, writes CNAMEs to Cloudflare.

provider:
  name: cloudflare

# Watch Gateway API resources cluster-wide.
sources:
  - gateway-httproute
  - gateway-grpcroute

# CF API token via secret env var.
env:
  - name: CF_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: cloudflare-api-token
        key: api-token

# Only manage records under this zone.
domainFilters:
  - joelmccoy.dev

# How records are owned (TXT registry).
registry: txt
txtOwnerId: homelab
txtPrefix: external-dns-

policy: sync   # create/update/delete records to match cluster state

# CF proxy mode (orange cloud) is OFF by default; CF Tunnel handles edge.
# To enable per-record proxy, add `external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"` annotation.

logLevel: info
