# external-dns helm values.
# Watches Gateway/HTTPRoute resources, writes CNAMEs to Cloudflare.

provider:
  name: cloudflare

# Watch Gateway API resources cluster-wide.
sources:
  - gateway-httproute
  - gateway-grpcroute

# CF API token via secret env var.
env:
  - name: CF_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: cloudflare-api-token
        key: api-token

# Only manage records under this zone.
domainFilters:
  - joelmccoy.dev

# How records are owned (TXT registry).
registry: txt
txtOwnerId: homelab
txtPrefix: external-dns-

policy: sync   # create/update/delete records to match cluster state

# CF Tunnel REQUIRES proxied (orange cloud) records — CF edge has to terminate
# the request and route it to the tunnel based on Host header. With gray-cloud
# DNS-only, cfargotunnel.com doesn't resolve to a usable IP and traffic dies.
extraArgs:
  - --cloudflare-proxied

logLevel: info

serviceMonitor:
  enabled: true
  interval: 60s
