apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: istio-gateway
  namespace: istio-ingress
  annotations:
    # Apply after Certificate so the TLS secret exists when the Gateway listener references it.
    argocd.argoproj.io/sync-wave: "5"
spec:
  gatewayClassName: istio
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.joelmccoy.dev"
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-joelmccoy-dev-tls
      allowedRoutes:
        namespaces:
          from: All
