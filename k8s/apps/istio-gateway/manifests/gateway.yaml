apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: istio-gateway
  namespace: istio-ingress
  annotations:
    # Apply after Certificate so the TLS secret exists when the Gateway listener references it.
    argocd.argoproj.io/sync-wave: "5"
    # No LoadBalancer in homelab — cloudflared reaches the Service in-cluster.
    networking.istio.io/service-type: ClusterIP
    # external-dns CNAME target: the Cloudflare tunnel address.
    # Tunnel ID comes from `tofu output cloudflare_tunnel_id`.
    external-dns.alpha.kubernetes.io/target: c88d1be8-f3e4-4c37-8c5b-294a2136c2d9.cfargotunnel.com
spec:
  gatewayClassName: istio
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.lab.joelmccoy.dev"
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: wildcard-lab-joelmccoy-dev-tls
      allowedRoutes:
        namespaces:
          from: All
