apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    # OSS Loki chart moved to grafana-community in March 2026; the original
    # grafana/loki chart now targets Grafana Enterprise Logs only.
    - repoURL: https://grafana-community.github.io/helm-charts
      chart: loki
      targetRevision: 13.5.0
      helm:
        releaseName: loki
        valueFiles:
          - $values/k8s/apps/loki/values.yaml
    - repoURL: https://github.com/joelmccoy/homelab-v3.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/joelmccoy/homelab-v3.git
      targetRevision: main
      path: k8s/apps/loki/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: loki
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
