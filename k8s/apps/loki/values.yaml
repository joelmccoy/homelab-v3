# Loki helm values — Monolithic mode for homelab-scale log volume (<20 GB/day).
# SimpleScalable is being removed in Loki 4; Distributed is overkill for us.

deploymentMode: Monolithic

loki:
  auth_enabled: false
  # Single-replica monolithic; no replication at the Loki layer (Longhorn handles
  # WAL durability, RustFS handles chunk durability).
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2026-05-04"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: s3
    bucketNames:
      chunks: loki-chunks
      ruler: loki-chunks
      admin: loki-chunks
    s3:
      endpoint: rustfs-svc.rustfs.svc.cluster.local:9000
      region: us-east-1
      s3forcepathstyle: true
      insecure: true
      # Credentials sourced from `loki-s3-credentials` Secret via extraEnvFrom +
      # `-config.expand-env=true` so we never embed keys in the rendered config.
      access_key_id: "${AWS_ACCESS_KEY_ID}"
      secret_access_key: "${AWS_SECRET_ACCESS_KEY}"
  limits_config:
    retention_period: 168h  # 7 days — v1 homelab retention window
    reject_old_samples: true
    reject_old_samples_max_age: 24h
    allow_structured_metadata: true
  compactor:
    retention_enabled: true
    delete_request_store: s3
  pattern_ingester:
    enabled: false

# Enable env-var expansion in loki-config.yaml.
singleBinary:
  replicas: 1
  extraArgs:
    - "-config.expand-env=true"
  extraEnvFrom:
    - secretRef:
        name: loki-s3-credentials
  persistence:
    enabled: true
    size: 10Gi
    storageClass: longhorn
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi

# Disable everything we don't need — chart defaults a LOT for SSD/Distributed
# modes that don't apply here.
write:
  replicas: 0
read:
  replicas: 0
backend:
  replicas: 0

# In-cluster nginx gateway — skip; Alloy + Grafana hit the loki Service directly.
gateway:
  enabled: false

# Bundled Memcached caches not needed at homelab volume.
chunksCache:
  enabled: false
resultsCache:
  enabled: false

# Bundled MinIO disabled — we use RustFS.
minio:
  enabled: false

# Self-monitoring relies on the deprecated grafana-agent-operator.
# We ship our own Alloy + kube-prometheus-stack scrapes Loki separately.
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
lokiCanary:
  enabled: false
test:
  enabled: false
