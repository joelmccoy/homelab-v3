# Longhorn helm values.
# Single source: consumed by k8s/apps/longhorn/application.yaml.

image:
  longhorn:
    engine:
      registry: docker.io
      repository: longhornio/longhorn-engine
      tag: v1.11.1
    manager:
      registry: docker.io
      repository: longhornio/longhorn-manager
      tag: v1.11.1
    ui:
      registry: docker.io
      repository: longhornio/longhorn-ui
      tag: v1.11.1
    instanceManager:
      registry: docker.io
      repository: longhornio/longhorn-instance-manager
      tag: v1.11.1
    shareManager:
      registry: docker.io
      repository: longhornio/longhorn-share-manager
      tag: v1.11.1
    backingImageManager:
      registry: docker.io
      repository: longhornio/backing-image-manager
      tag: v1.11.1
    supportBundleKit:
      registry: docker.io
      repository: longhornio/support-bundle-kit
      tag: v0.0.81
  csi:
    attacher:
      registry: docker.io
      repository: longhornio/csi-attacher
      tag: v4.11.0
    provisioner:
      registry: docker.io
      repository: longhornio/csi-provisioner
      tag: v5.3.0-20260225
    nodeDriverRegistrar:
      registry: docker.io
      repository: longhornio/csi-node-driver-registrar
      tag: v2.16.0
    resizer:
      registry: docker.io
      repository: longhornio/csi-resizer
      tag: v2.1.0
    snapshotter:
      registry: docker.io
      repository: longhornio/csi-snapshotter
      tag: v8.5.0
    livenessProbe:
      registry: docker.io
      repository: longhornio/livenessprobe
      tag: v2.18.0

# The pre-upgrade checker Job is a Helm pre-upgrade hook that requires the
# longhorn-service-account, which is created in the Sync phase — but ArgoCD
# runs Helm hooks in PreSync, before the SA exists. Result: deadlock on first
# install. The chart authors expose this opt-out for exactly this case.
preUpgradeChecker:
  jobEnabled: false

defaultSettings:
  defaultDataPath: /var/mnt/longhorn-data
  createDefaultDiskLabeledNodes: false
  # 3 replicas across distinct K8s nodes — once cp-0/cp-1/cp-2 are spread
  # across separate Proxmox hosts (pve/pve1/pve2/pve3), every replica lands
  # on different hardware, so any single host can fail without data loss.
  defaultReplicaCount: 3
  replicaSoftAntiAffinity: true
  storageOverProvisioningPercentage: 200

persistence:
  defaultClass: true
  defaultClassReplicaCount: 3
  defaultDataLocality: best-effort
  defaultFsType: ext4

longhornUI:
  replicas: 1

ingress:
  enabled: false
