apiVersion: apps/v1
kind: Deployment
metadata:
  name: mealie
  namespace: mealie
  labels:
    app.kubernetes.io/name: mealie
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mealie
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mealie
    spec:
      securityContext:
        # Run as Mealie's built-in non-root `abc` user. The entrypoint skips
        # its root-only chown/gosu path when the current UID matches PUID.
        runAsUser: 911
        runAsGroup: 911
        runAsNonRoot: true
        fsGroup: 911
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mealie
          image: ghcr.io/mealie-recipes/mealie:v3.16.0
          ports:
            - name: http
              containerPort: 9000
          env:
            - name: TZ
              value: America/Chicago
            - name: PUID
              value: "911"
            - name: PGID
              value: "911"
            - name: BASE_URL
              value: https://mealie.joelmccoy.dev
            - name: API_DOCS
              value: "false"
            - name: LOG_LEVEL
              value: info
            - name: DAILY_SCHEDULE_TIME
              value: "03:00"
            - name: ALLOW_SIGNUP
              value: "false"
            - name: ALLOW_PASSWORD_LOGIN
              value: "false"
            - name: DB_ENGINE
              value: postgres
            - name: POSTGRES_SERVER
              value: mealie-pg-rw
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: mealie
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: mealie-pg-app
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mealie-pg-app
                  key: password
            - name: OIDC_AUTH_ENABLED
              value: "true"
            - name: OIDC_SIGNUP_ENABLED
              value: "true"
            - name: OIDC_CONFIGURATION_URL
              value: https://sso.joelmccoy.dev/realms/homelab/.well-known/openid-configuration
            - name: OIDC_CLIENT_ID
              value: mealie
            - name: OIDC_PROVIDER_NAME
              value: Keycloak
            - name: OIDC_USER_GROUP
              value: admins
            - name: OIDC_ADMIN_GROUP
              value: admins
            - name: OIDC_GROUPS_CLAIM
              value: groups
            - name: OIDC_SCOPES_OVERRIDE
              value: openid profile email groups
            - name: OIDC_AUTO_REDIRECT
              value: "true"
            - name: OIDC_REMEMBER_ME
              value: "true"
            # Gunicorn must trust the in-cluster Gateway proxy so OIDC redirect
            # URLs keep the external https scheme after TLS termination.
            - name: GUNICORN_CMD_ARGS
              value: --forwarded-allow-ips=*
          volumeMounts:
            - name: data
              mountPath: /app/data
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mealie-data
