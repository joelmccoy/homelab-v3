# Crossplane-managed OIDC client for Mealie.
# Confidential client + PKCE: Mealie's backend exchanges the auth code for a
# token server-side using the client_secret (a hard requirement enforced by
# Mealie even when the IdP would accept a public client).
apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: Client
metadata:
  name: mealie
  annotations:
    # Wave -50: must apply (and become Ready) before the deployment so the
    # OIDC_CLIENT_SECRET secretKeyRef has a Secret to resolve, otherwise the
    # pod fails CreateContainerConfigError and sync deadlocks.
    argocd.argoproj.io/sync-wave: "-50"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  providerConfigRef:
    name: keycloak
  forProvider:
    realmId: homelab
    clientId: mealie
    name: Mealie
    description: Mealie recipe manager
    enabled: true
    accessType: CONFIDENTIAL
    standardFlowEnabled: true
    directAccessGrantsEnabled: false
    serviceAccountsEnabled: false
    pkceCodeChallengeMethod: S256
    validRedirectUris:
      - https://mealie.joelmccoy.dev/login
      - https://mealie.joelmccoy.dev/login?direct=1
    validPostLogoutRedirectUris:
      - https://mealie.joelmccoy.dev/login
      - https://mealie.joelmccoy.dev/login?direct=1
    webOrigins:
      - https://mealie.joelmccoy.dev
    rootUrl: https://mealie.joelmccoy.dev
    baseUrl: /
  writeConnectionSecretToRef:
    name: mealie-keycloak-client
    namespace: mealie
---
apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: ClientDefaultScopes
metadata:
  name: mealie
  annotations:
    # One wave after Client so Crossplane has resolved the clientIdRef.
    argocd.argoproj.io/sync-wave: "-49"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  providerConfigRef:
    name: keycloak
  forProvider:
    realmId: homelab
    clientIdRef:
      name: mealie
    defaultScopes:
      - profile
      - email
      - groups
