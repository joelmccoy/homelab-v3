apiVersion: v1
kind: Namespace
metadata:
  name: metrics-server
  annotations:
    argocd.argoproj.io/sync-wave: "-100"
  labels:
    app.kubernetes.io/name: metrics-server
    # Aggregated APIService is contacted by kube-apiserver (unmeshed); ambient
    # only intercepts traffic from meshed sources, so this is safe.
    istio.io/dataplane-mode: ambient
