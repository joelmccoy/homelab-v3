# metrics-server helm values.

# Talos kubelets serve /metrics over self-signed TLS (no kubelet-csr-approver yet)
# so verification has to be skipped. Tracked in backlog: switch to proper signing
# once kubelet-csr-approver is installed.
defaultArgs:
  - --cert-dir=/tmp
  - --kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname
  - --kubelet-use-node-status-port
  - --metric-resolution=15s
  - --kubelet-insecure-tls

replicas: 1

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    memory: 128Mi
