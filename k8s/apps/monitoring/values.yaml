# kube-prometheus-stack helm values.
# Single source: consumed by k8s/apps/monitoring/application.yaml.

crds:
  enabled: true

prometheusOperator:
  image:
    registry: quay.io
    repository: prometheus-operator/prometheus-operator
    tag: v0.90.1
  prometheusConfigReloader:
    image:
      registry: quay.io
      repository: prometheus-operator/prometheus-config-reloader
      tag: v0.90.1
  admissionWebhooks:
    patch:
      image:
        registry: ghcr.io
        repository: jkroepke/kube-webhook-certgen
        tag: 1.8.2

kube-state-metrics:
  image:
    registry: registry.k8s.io
    repository: kube-state-metrics/kube-state-metrics
    tag: v2.18.0

prometheus-node-exporter:
  image:
    registry: quay.io
    repository: prometheus/node-exporter
    tag: v1.11.1

# Cilium is running with kube-proxy replacement, so kube-proxy targets and rules
# would be permanently absent/noisy.
kubeProxy:
  enabled: false

# Talos control-plane component metrics need a deliberate scrape plan. Keep
# these disabled for the foundation PR rather than shipping false-positive
# targets against loopback- or certificate-protected endpoints.
kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeEtcd:
  enabled: false

grafana:
  enabled: true
  # client_secret injected from the Crossplane-managed grafana-keycloak-client Secret.
  envValueFrom:
    GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
      secretKeyRef:
        name: grafana-keycloak-client
        key: attribute.client_secret
  serviceMonitor:
    enabled: true
  persistence:
    enabled: true
    type: pvc
    storageClassName: longhorn
    size: 5Gi
    accessModes: ["ReadWriteOnce"]
  # Auto-discovered Prometheus datasource is provided by kube-prometheus-stack;
  # Loki is added here so log queries land alongside metrics in the same UI.
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki.loki.svc.cluster.local:3100
      isDefault: false
      jsonData:
        timeout: 60
        maxLines: 1000
  grafana.ini:
    server:
      root_url: https://grafana.joelmccoy.dev
    analytics:
      reporting_enabled: false
      check_for_updates: false
    auth:
      disable_login_form: true
    auth.anonymous:
      enabled: false
    auth.basic:
      enabled: false
    auth.generic_oauth:
      enabled: true
      name: Keycloak
      allow_sign_up: true
      client_id: grafana
      client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
      scopes: openid profile email groups
      auth_url: https://sso.joelmccoy.dev/realms/homelab/protocol/openid-connect/auth
      token_url: https://sso.joelmccoy.dev/realms/homelab/protocol/openid-connect/token
      api_url: https://sso.joelmccoy.dev/realms/homelab/protocol/openid-connect/userinfo
      role_attribute_path: contains(groups[*], 'admins') && 'Admin' || 'Viewer'
      role_attribute_strict: false
    users:
      allow_sign_up: false

alertmanager:
  enabled: true
  alertmanagerSpec:
    image:
      registry: quay.io
      repository: prometheus/alertmanager
      tag: v0.32.1
    replicas: 1
    retention: 120h
    storage:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi

prometheus:
  enabled: true
  prometheusSpec:
    image:
      registry: quay.io
      repository: prometheus/prometheus
      tag: v3.11.3
    replicas: 1
    retention: 14d
    retentionSize: 18GiB
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        memory: 2Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 25Gi

    # Let Prometheus discover ServiceMonitors/PodMonitors/PrometheusRules from
    # this repo without requiring each chart to copy Helm release labels.
    ruleSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    scrapeConfigSelectorNilUsesHelmValues: false

    ruleNamespaceSelector: {}
    serviceMonitorNamespaceSelector: {}
    podMonitorNamespaceSelector: {}
    probeNamespaceSelector: {}
    scrapeConfigNamespaceSelector: {}

defaultRules:
  rules:
    etcd: false
    kubeControllerManager: false
    kubeProxy: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
