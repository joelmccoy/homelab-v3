# RustFS console listener (port 9001) serves the console UI, the admin API,
# AND proxies S3 API calls — single hostname is required for the post-OIDC
# fragment redirect to land on a port that knows about /rustfs/console/*.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rustfs
  namespace: rustfs
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: istio-gateway
      namespace: istio-ingress
  hostnames:
    - "s3.joelmccoy.dev"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: rustfs-svc
          port: 9001
          weight: 1
