# Crossplane-managed OIDC Client in Keycloak homelab realm.
# Connection Secret holds the generated client_secret; rustfs values reference
# it via secretKeyRef in extraEnv (no part-of=argocd label needed — the label
# trick is specific to ArgoCD's $secret:key syntax).
#
# Wave -50: must apply (and become Ready) BEFORE the helm chart's wave-0
# Deployment, otherwise the pod fails CreateContainerConfigError on missing
# secret and the sync gets stuck at wave 0 — Client CR never gets applied.
apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: Client
metadata:
  name: rustfs
  annotations:
    argocd.argoproj.io/sync-wave: "-50"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  providerConfigRef:
    name: keycloak
  forProvider:
    realmId: homelab
    clientId: rustfs
    name: RustFS
    description: RustFS object storage (console + STS)
    enabled: true
    accessType: CONFIDENTIAL
    standardFlowEnabled: true
    directAccessGrantsEnabled: false
    serviceAccountsEnabled: false
    # Single host serves S3 API, console UI, and admin/OIDC endpoints.
    validRedirectUris:
      - https://s3.joelmccoy.dev/*
    validPostLogoutRedirectUris:
      - https://s3.joelmccoy.dev/*
    webOrigins:
      - https://s3.joelmccoy.dev
  writeConnectionSecretToRef:
    name: rustfs-keycloak-client
    namespace: rustfs
---
apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: ClientDefaultScopes
metadata:
  name: rustfs
  annotations:
    # One wave after Client so Crossplane has resolved the clientIdRef.
    argocd.argoproj.io/sync-wave: "-49"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  providerConfigRef:
    name: keycloak
  forProvider:
    realmId: homelab
    clientIdRef:
      name: rustfs
    defaultScopes:
      - profile
      - email
      - roles
      - web-origins
      - groups
